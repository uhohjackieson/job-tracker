<div class="min-h-screen flex items-center justify-center bg-slate-100">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-2">Welcome Back</h1>

    <p class="text-slate-500 text-center mb-8">Sign in to your Job Tracker</p>

    <div class="space-y-4">
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        class="w-full border border-slate-300 rounded-xl px-4 py-3"
      />

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        class="w-full border border-slate-300 rounded-xl px-4 py-3"
      />

      <button
        type="button"
        (click)="login()"
        class="w-full bg-blue-600 text-white rounded-xl py-3 font-semibold hover:bg-blue-500"
      >
        Login
      </button>
    </div>
  </div>
</div>
